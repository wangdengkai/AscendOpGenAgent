# Remote Server Configuration Template
# Copy this file to config.yaml and modify as needed

remote_server:
  url: "http://your-remote-server:8080"
  api_key: ""  # Optional API key for authentication
  timeout:
    connect: 10
    read: 600

defaults:
  soc_version: "Ascend910B2"
  npu_id: 0
  warmup: 5
  repeat: 10
  seed: 0

advanced:
  clean_build: true
  enable_benchmark: true
  auto_cleanup: true
  cleanup_after_seconds: 3600
  max_file_size_mb: 50
  max_total_size_mb: 200
