strategy_id: P71
description: Matmul IBShare L1 共享适用性检查 — 算子为 MIX 场景且多 AIV 共用 A/B 矩阵，当前未使能 IBShare
checks:
  - id: has_mix_matmul
    type: grep_count
    pattern: "MIX|mix|Matmul|matmul|AIV|aiv|IBShare"
    files: [kernel]
    expected: ">= 1"
    fail_msg: "算子非 MIX Matmul → P71 不适用"

  - id: has_shared_matrix
    type: grep_count
    pattern: "weight|bias|共享|shared|same.*matrix|共用"
    files: [kernel]
    expected: ">= 1"
    fail_msg: "算子无共享矩阵 → P71 收益低"

  - id: no_ibshare_yet
    type: grep_count
    pattern: "IBSHARE|IBShare|ibshare|LayoutMode.*true|IBShare.*true"
    files: [kernel]
    expected: "== 0"
    fail_msg: "算子已使能 IBShare → P71 已应用"

  - id: not_pure_validation
    type: grep_count
    pattern: "OP_CHECK|shape.*check|dim.*check|validation"
    files: [kernel, header]
    expected: "<= 3"
    fail_msg: "纯 Host 侧 shape 校验 → P71 解决的是 L1 共享优化"
