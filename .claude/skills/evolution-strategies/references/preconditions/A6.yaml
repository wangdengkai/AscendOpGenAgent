strategy_id: A6
description: 高精度 rsqrt 适用性检查 — 算子包含 rsqrt/sqrt+reciprocal 计算，且当前未使用 Newton-Raphson 迭代优化精度

checks:
  - id: has_rsqrt_or_sqrt
    type: grep_count
    pattern: "rsqrt|Rsqrt|Sqrt|sqrt|Reciprocal|reciprocal|inv.*sqrt|1\\.0f.*sqrt"
    files: [kernel]
    expected: ">= 1"
    fail_msg: "算子无 rsqrt 或 sqrt → A6 不适用。检查是否为纯线性算子"

  - id: has_normalization_usage
    type: grep_count
    pattern: "LayerNorm|RMSNorm|layernorm|rmsnorm|Normalize|norm|var.*eps"
    files: [kernel, header]
    expected: ">= 1"
    fail_msg: "算子无归一化场景 → A6 收益低。rsqrt 优化主要针对 LayerNorm/RMSNorm"

  - id: no_newton_raphson_yet
    type: grep_count
    pattern: "Newton|newton|NR_ITER|SCALAR1|SCALAR2|y1.*y0|iter.*rsqrt"
    files: [kernel]
    expected: "== 0"
    fail_msg: "算子已使用 Newton-Raphson 迭代 → A6 已应用"

  - id: not_pure_validation
    type: grep_count
    pattern: "OP_CHECK|shape.*check|dim.*check|validation"
    files: [kernel, header]
    expected: "<= 3"
    fail_msg: "纯 Host 侧 shape 校验 → A6 解决的是 Kernel 内数值精度，非 Host 校验"
