strategy_id: A7
description: 索引与边界安全适用性检查 — 算子包含索引操作（Gather/Scatter/索引访问），且当前未做边界安全检查

checks:
  - id: has_index_operation
    type: grep_count
    pattern: "indices|Indices|index|Index|Gather|gather|Scatter|scatter|offset|Offset|argmax|argmin"
    files: [kernel]
    expected: ">= 1"
    fail_msg: "算子无索引操作 → A7 不适用。检查是否为纯 elementwise 算子"

  - id: has_int64_or_boundary_risk
    type: grep_count
    pattern: "INT64|int64_t|INT32|int32_t|boundary|Boundary|clamp|Clamp|clip|Clip|out.*bound"
    files: [kernel, header]
    expected: ">= 1"
    fail_msg: "算子使用 INT32 索引且无越界风险 → A7 收益低"

  - id: no_boundary_safety_yet
    type: grep_count
    pattern: "min.*max|Maxs|mins|Mins|Compare.*index|boundary.*check|clamp.*index|Select.*bound"
    files: [kernel]
    expected: "== 0"
    fail_msg: "算子已有边界检查或 clamp 处理 → A7 已应用"

  - id: not_pure_validation
    type: grep_count
    pattern: "OP_CHECK|shape.*check|dim.*check|validation"
    files: [kernel, header]
    expected: "<= 3"
    fail_msg: "纯 Host 侧 shape 校验 → A7 解决的是 Kernel 内索引安全，非 Host 校验"
