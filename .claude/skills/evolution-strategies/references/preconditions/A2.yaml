strategy_id: A2
description: Welford 数值稳定适用性检查 — 算子包含均值/方差归约计算，且当前未使用 Welford 算法避免累积误差

checks:
  - id: has_mean_var_computation
    type: grep_count
    pattern: "mean|Mean|var|Var|sum|Sum|reduce|Reduce|normali|Normali|batchNorm|layerNorm|rmsNorm"
    files: [kernel]
    expected: ">= 1"
    fail_msg: "算子无均值/方差/归约计算 → A2 不适用。检查是否为纯 elementwise 算子"

  - id: has_normalization_pattern
    type: grep_count
    pattern: "BatchNorm|LayerNorm|RMSNorm|InstanceNorm|GroupNorm|norm|Norm"
    files: [kernel, header]
    expected: ">= 1"
    fail_msg: "算子无归一化模式 → A2 收益低。检查是否为纯 reduce 算子"

  - id: no_welford_yet
    type: grep_count
    pattern: "welford|Welford|batchVarScale|N-1|unbiased|varScale|meanSqLocal"
    files: [kernel]
    expected: "== 0"
    fail_msg: "算子已使用 Welford 或样本方差校正 → A2 已应用"

  - id: not_pure_validation
    type: grep_count
    pattern: "OP_CHECK|shape.*check|dim.*check|validation"
    files: [kernel, header]
    expected: "<= 3"
    fail_msg: "纯 Host 侧 shape 校验 → A2 解决的是 Kernel 内数值稳定，非 Host 校验"
