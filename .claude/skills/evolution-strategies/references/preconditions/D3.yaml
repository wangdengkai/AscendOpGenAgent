strategy_id: D3
description: TilingKey 类型分发适用性检查 — 算子支持多数据类型（FP16/BF16/FP32），且当前未用 TilingKey 做编译期分发

checks:
  - id: has_type_dispatch
    type: grep_count
    pattern: "TilingKey|tilingKey|template|constexpr|is_same|if.*constexpr|data_type|DataType"
    files: [kernel, header]
    expected: ">= 1"
    fail_msg: "算子无模板或类型分发 → D3 不适用。检查是否为单精度算子"

  - id: has_multiple_dtypes
    type: grep_count
    pattern: "DT_FLOAT|DT_FLOAT16|DT_BF16|float|half|bf16|bfloat16|fp16|fp32"
    files: [kernel, header]
    expected: ">= 2"
    fail_msg: "算子仅支持单数据类型 → D3 收益低。检查是否需要支持多精度"

  - id: no_tilingkey_dispatch_yet
    type: grep_count
    pattern: "SetTilingKeyMode|TILING_KEY|FP16_MODE|FP32_MODE|BF16_MODE"
    files: [kernel, header]
    expected: "== 0"
    fail_msg: "算子已使用 TilingKey 分发 → D3 已应用"

  - id: not_pure_validation
    type: grep_count
    pattern: "OP_CHECK|shape.*check|dim.*check|validation"
    files: [kernel, header]
    expected: "<= 3"
    fail_msg: "纯 Host 侧 shape 校验 → D3 解决的是 Kernel 类型分发，非 Host 校验"
