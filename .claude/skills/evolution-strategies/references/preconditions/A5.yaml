strategy_id: A5
description: Softmax 数值安全适用性检查 — 算子必须有 softmax 或 exp 计算，且当前未做 max-subtraction 数值稳定处理

checks:
  - id: has_softmax_or_exp
    type: grep_count
    pattern: "softmax|Softmax|exp|Exp|log|Log"
    files: [kernel]
    expected: ">= 1"
    fail_msg: "算子无 softmax 或 exp → A5 不适用。检查是否为纯线性算子"

  - id: no_max_trick_yet
    type: grep_count
    pattern: "max.*sub|subtract.*max|maxVal|maxLocal|online.*softmax|max.*exp"
    files: [kernel]
    expected: "== 0"
    fail_msg: "算子已有 max-subtraction 或 online softmax → A5 已应用"

  - id: has_precision_risk
    type: grep_count
    pattern: "bf16|bfloat16|half|fp16|exp.*half|exp.*bf16"
    files: [kernel]
    expected: ">= 1"
    fail_msg: "算子使用 FP32 exp → 数值风险低。检查是否需要优化"

  - id: not_pure_validation
    type: grep_count
    pattern: "OP_CHECK|shape.*check|dim.*check|validation"
    files: [kernel, header]
    expected: "<= 3"
    fail_msg: "纯 Host 侧 shape 校验 → A5 解决的是 Kernel 内数值安全，非 Host 校验"
